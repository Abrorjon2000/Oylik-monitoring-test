<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustoz Pro | Premium v17.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { 
            --primary: #6366f1; 
            --secondary: #f43f5e; 
            --success: #10b981; 
            --bg: #f3f4f6; 
            --text: #1f2937; 
            --glass: rgba(255, 255, 255, 0.95);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 15px; 
            color: var(--text); 
            line-height: 1.6; 
        }

        .container { max-width: 800px; margin: auto; }

        .glass-card { 
            background: var(--glass); 
            border-radius: 24px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.08); 
            margin-bottom: 20px; 
            border: 1px solid #ffffff; 
            backdrop-filter: blur(10px);
        }

        h1, h2 { text-align: center; color: var(--primary); }
        
        select, input, textarea { 
            width: 100%; 
            padding: 16px; 
            border: 2px solid #e5e7eb; 
            border-radius: 16px; 
            font-size: 16px; 
            margin-top: 8px; 
            font-family: inherit; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
        }

        select:focus, input:focus { border-color: var(--primary); background: #f5f3ff; }

        .btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            font-size: 16px; 
            transition: 0.3s; 
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); 
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: scale(0.98); }
        .btn-success { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .btn-sync { background: #8b5cf6; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; color: #64748b; }

        /* Test Sahifasi Stili */
        #timer { 
            font-size: 32px; 
            font-weight: 800; 
            color: var(--secondary); 
            text-align: center; 
            padding: 15px;
            position: sticky; 
            top: 0; 
            z-index: 100;
            background: var(--glass);
            border-radius: 0 0 20px 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .q-card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid #f1f5f9; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); 
            transition: 0.3s;
        }

        .q-text { font-size: 19px; font-weight: 700; margin-bottom: 20px; color: #111827; }

        .option-label { 
            display: flex; 
            align-items: center; 
            padding: 16px; 
            background: #f9fafb; 
            border: 2px solid #f3f4f6; 
            border-radius: 14px; 
            margin: 12px 0; 
            cursor: pointer; 
            transition: 0.2s; 
        }

        .option-label:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-label input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--primary); flex-shrink: 0; }

        .tab-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #e2e8f0; color: #64748b; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: var(--primary); color: white; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #f1f5f9; text-align: left; font-size: 14px; }
        
        @media (max-width: 600px) {
            .glass-card { padding: 20px; }
            .q-text { font-size: 17px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="glass-card">
        <h1>Ustoz Pro</h1>
        <p style="text-align:center; color:#64748b; margin-bottom:30px; font-size: 14px;">Zamaxshariy izdoshlari xususiy maktabi</p>
        
        <div style="display: grid; gap: 10px;">
            <select id="sClass" onchange="updateStudentsAndSubjects()">
                <option value="">-- Sinfni tanlang --</option>
                <option value="5-sinf">5-sinf</option>
                <option value="6-sinf">6-sinf</option>
                <option value="7-sinf">7-sinf</option>
                <option value="8-sinf">8-sinf</option>
            </select>
            <select id="sName"><option value="">-- O'quvchi ismi --</option></select>
            <select id="sSub"><option value="">-- Fan yo'nalishi --</option></select>
            <button class="btn" onclick="startTest()">Testni Boshlash</button>
            <button class="btn btn-outline" onclick="showAdminLogin()">Admin Panel</button>
        </div>
    </div>

    <div id="admin-login" class="hidden glass-card">
        <h2>Admin Kirish</h2>
        <input type="password" id="admin-pass" placeholder="Parolni kiriting...">
        <button class="btn" onclick="checkAdmin()">Kirish</button>
        <button class="btn btn-outline" onclick="location.reload()">Orqaga</button>
    </div>

    <div id="test-screen" class="hidden">
        <div id="timer">00:00</div>
        <div id="questions-area"></div>
        <button class="btn btn-success" style="margin-bottom: 50px;" onclick="finishTest()">Testni Yakunlash</button>
    </div>

    <div id="result-screen" class="hidden glass-card" style="text-align:center">
        <h2 id="res-student-name"></h2>
        <div id="res-score" style="font-size: 80px; font-weight: 900; color: var(--success); margin: 20px 0;">0/0</div>
        <p id="res-status" style="font-weight: 600; color: #64748b;"></p>
        <button class="btn" onclick="location.reload()">Asosiy sahifaga qaytish</button>
    </div>

    <div id="admin-panel" class="hidden glass-card">
        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-cloud')">Bulutli yuklash</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-list')">Natijalar</button>
        </div>

        <div id="tab-cloud" class="tab-content">
            <button class="btn btn-sync" onclick="syncWithCloud()">Google Sheets'dan yangilash</button>
            <p id="last-update" style="font-size: 12px; margin-top: 15px; text-align:center; color: #94a3b8;">Yangilanish: ---</p>
        </div>

        <div id="tab-list" class="tab-content hidden">
            <div id="pdf-area">
                <table>
                    <thead><tr><th>O'quvchi</th><th>Sinf/Fan</th><th>Ball</th></tr></thead>
                    <tbody id="res-body"></tbody>
                </table>
            </div>
            <button class="btn btn-success" onclick="downloadPDF()">PDF Yuklash</button>
        </div>
        <button class="btn btn-outline" onclick="location.reload()">Chiqish</button>
    </div>
</div>

<script>
    const TG_TOKEN = "1236509656:AAH8lsLDpQ-4r5f2ZuHXxVEigrfMqdlbz9g"; 
    const TG_CHAT_ID = "727716224"; 
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT80cxkCgcYdA0OqUOTkrLHeq-wp5MU29ullRUnuTX8L5IM3F3GIxdLtgbJxFrt18unljnQgdaoyarJ/pub?output=csv";

    const STATIC_DATA = {
        students: {
            "5-sinf": ["Yo‘ldoshaliyev Abdulahad", "Nabijonova Sitora", "Abdumutaliyeva Asalxon", "Usmonxo‘jayeva Diyoraxon", "Bekmirzayev Otabek", "Hakimjonov Hamidullo", "Rustamova Malikaxon", "Usmonaliyev Alisher", "Musajonov Hojimurod", "Alijonov Islombek", "Imomova Xushnoza", "Nu‘monova Madina", "Sobirov Muhammadbobur", "Zuxriddinova Yasminaxon", "Inomjonov Ibrohim", "Bannonov Abdulloh", "Saidmo'minova Muhsinaxon", "Muhammadolimov Fahriddin", "Odiljonova Muslimaxon"],
            "6-sinf": ["Nosirjonova Layloxon", "Muhammadaliyeva Sevaraxon", "Mamasoliyeva Hadicha", "To‘lqinjonova Shahzoda", "Mamasoliyeva Mubina", "Qo‘shoqboyev Muhammadaziz", "Mansurjonov Hojakbar", "Soliyev Shamsiddin", "G‘ulomjonov Muhammaddiyor", "Soliyev Ziyovuddin", "Rustamjonova Rayxona", "Alijonov Anasxon", "Yusufjonova Fotimaxon", "Mamadnosirov G'olibjon", "Odiljonova Salomatxon", "Abdulazizova Nozimaxon"],
            "7-sinf": ["Yo'ldoshaliyeva Farzona", "Abdullayev Muslimbek", "Adhamov Jahongir", "Muxtorov Abdulloh", "Adhamjonov Muhammadyusuf", "Ergashboyev Abdulloh", "Abdumutalov Abdulbosit", "Akramjonov Murodillo", "Ashuraliyev Ilhomjon", "Omonaliyev Muhammad", "Bahodirov Saidabror", "Alijonov Mus'ab", "Kamoliddinov Shamshodbek", "Bahriddinov Muhammadjon", "Nuraliyev Muhammadyasin", "Xoshimjonov Dovudbek", "Ibrohimov Islomjon"],
            "8-sinf": ["Rustamova Mushtariy", "Usmonaliyev Sanjarbek", "Zokirjonova Zahroxon", "Nurmatova Mohinabonu", "Mamasoliyeva Arofatxon", "Mirzajonov Fayzulloh", "Zafarjonov Behruzbek", "Oʻlmasova Mohichehra", "Valijonova Zeboxon", "Lazizxonova Oyshabonu", "Tursunov Aliy", "Qodirov Bobomurod", "Inomjonova Umidaxon", "Ortiqboyeva Malikaxon", "Adhamjonov Muhammadsaid", "Qodirova Sarvinoz", "Abdulazizov Mashrabbek"]
        },
        subjects: {
            "5-sinf": ["Tarix", "Turk tili"],
            "6-sinf": ["Tarix", "Turk tili"],
            "7-sinf": ["Tarix", "Turk tili", "Geografiya"],
            "8-sinf": ["Tarix", "Turk tili", "Geografiya"]
        }
    };

    let db = JSON.parse(localStorage.getItem('ustoz_pro_v17')) || { classes: {}, results: [], lastSync: "---" };
    function save() { localStorage.setItem('ustoz_pro_v17', JSON.stringify(db)); }

    function updateStudentsAndSubjects() {
        const cls = document.getElementById('sClass').value;
        const sn = document.getElementById('sName'), ss = document.getElementById('sSub');
        sn.innerHTML = '<option value="">-- O\'quvchi --</option>';
        ss.innerHTML = '<option value="">-- Fan --</option>';
        if(cls) {
            STATIC_DATA.students[cls].forEach(s => sn.innerHTML += `<option value="${s}">${s}</option>`);
            STATIC_DATA.subjects[cls].forEach(sub => ss.innerHTML += `<option value="${sub}">${sub}</option>`);
        }
    }

    function showAdminLogin() { 
        document.getElementById('login-screen').classList.add('hidden'); 
        document.getElementById('admin-login').classList.remove('hidden'); 
    }

    function checkAdmin() {
        if(document.getElementById('admin-pass').value === "admin123") {
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('last-update').innerText = "Yangilanish: " + db.lastSync;
        } else { alert("Xato parol!"); }
    }

    async function syncWithCloud() {
        const btn = document.querySelector('.btn-sync');
        const oldText = btn.innerText;
        btn.innerText = "Yuklanmoqda...";
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            const lines = csv.split('\n').slice(1);
            db.classes = {};
            lines.forEach(line => {
                const p = line.split(',');
                if(p.length >= 8) {
                    const sinf = p[0].trim(), fan = p[1].trim();
                    if(!db.classes[sinf]) db.classes[sinf] = {};
                    if(!db.classes[sinf][fan]) db.classes[sinf][fan] = { qs: [], time: parseInt(p[8])||20, limit: parseInt(p[9])||15 };
                    db.classes[sinf][fan].qs.push({ q:p[2].trim(), a:p[3].trim(), b:p[4].trim(), c:p[5].trim(), d:p[6].trim(), cr:p[7].trim().toLowerCase() });
                }
            });
            db.lastSync = new Date().toLocaleString(); save();
            alert("Ma'lumotlar yangilandi!"); location.reload();
        } catch (e) { 
            alert("Xatolik! Google Sheets linkini tekshiring."); 
            btn.innerText = oldText;
        }
    }

    let currentQs = [], timer;
    function startTest() {
        const cls = document.getElementById('sClass').value, sub = document.getElementById('sSub').value, name = document.getElementById('sName').value;
        if(!cls || !sub || !name) return alert("Barcha maydonlarni to'ldiring!");
        if(!db.classes[cls] || !db.classes[cls][sub]) return alert("Ushbu fan uchun savollar hali yuklanmagan!");

        const conf = db.classes[cls][sub];
        currentQs = [...conf.qs].sort(() => 0.5 - Math.random()).slice(0, conf.limit).map(q => {
            let opts = [{k:'a', v:q.a}, {k:'b', v:q.b}, {k:'c', v:q.c}, {k:'d', v:q.d}].sort(() => 0.5 - Math.random());
            return { ...q, mixed: opts };
        });

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        
        const area = document.getElementById('questions-area'); 
        area.innerHTML = '';
        currentQs.forEach((q, i) => {
            let optsHtml = q.mixed.map(o => `<label class="option-label"><input type="radio" name="q${i}" value="${o.k}"> <span>${o.v}</span></label>`).join('');
            area.innerHTML += `<div class="q-card"><div class="q-text">${i+1}. ${q.q}</div>${optsHtml}</div>`;
        });

        let t = conf.time * 60;
        timer = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(--t < 0) finishTest(true);
        }, 1000);
        window.scrollTo(0,0);
    }

    async function finishTest(auto = false) {
        if(!auto && !confirm("Testni yakunlashni tasdiqlaysizmi?")) return;
        
        clearInterval(timer);
        let score = 0;
        currentQs.forEach((q, i) => {
            const ans = document.querySelector(`input[name="q${i}"]:checked`);
            if(ans && ans.value === q.cr) score++;
        });

        const res = { 
            name: document.getElementById('sName').value, 
            cls: document.getElementById('sClass').value, 
            sub: document.getElementById('sSub').value, 
            score, 
            total: currentQs.length, 
            date: new Date().toLocaleString() 
        };
        
        db.results.push(res); 
        save();
        
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-score').innerText = `${score}/${res.total}`;
        document.getElementById('res-student-name').innerText = res.name;
        document.getElementById('res-status').innerText = score > (res.total/2) ? "Barakalla! Yaxshi natija." : "Yana ko'proq tayyorlanishingiz kerak.";

        // Telegramga yuborish mantiqi
        const msg = `📊 *YANGI NATIJA*\n\n👤 *O'quvchi:* ${res.name}\n🏫 *Sinf:* ${res.cls}\n📚 *Fan:* ${res.sub}\n✅ *Ball:* ${score} / ${res.total}\n📅 *Sana:* ${res.date}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        } catch (e) {
            console.error("TG Error:", e);
        }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        e.target.classList.add('active');
        if(id === 'tab-list') {
            const body = document.getElementById('res-body'); 
            body.innerHTML = '';
            db.results.slice().reverse().forEach(r => {
                body.innerHTML += `<tr><td>${r.name}</td><td>${r.cls} (${r.sub})</td><td><b>${r.score}/${r.total}</b></td></tr>`;
            });
        }
    }

    function downloadPDF() { 
        const opt = { margin: 1, filename: 'Natijalar.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().set(opt).from(document.getElementById('pdf-area')).save(); 
    }
</script>
</body>
</html>
