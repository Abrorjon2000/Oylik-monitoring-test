<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustoz Pro | Premium v15.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --secondary: #f43f5e; --success: #10b981; --bg: #f3f4f6; --text: #1f2937; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--text); line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .glass-card { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #ffffff; }
        
        /* Chiroyli tugmalar va formalar */
        select, input, textarea { width: 100%; padding: 16px; border: 2px solid #e5e7eb; border-radius: 16px; font-size: 16px; margin-top: 8px; font-family: inherit; transition: 0.3s; box-sizing: border-box; outline: none; }
        select:focus { border-color: var(--primary); background: #f5f3ff; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 15px; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .btn:active { transform: scale(0.98); }
        .btn-sync { background: #8b5cf6; }
        .btn-success { background: var(--success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        
        /* Savol kartochkalari dizayni */
        .q-card { background: #ffffff; padding: 25px; border-radius: 20px; border: 1px solid #f1f5f9; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .q-text { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #111827; }
        
        /* Variantlar dizayni (Rasmda buzilgan qism) */
        .option-label { display: flex; align-items: center; padding: 16px; background: #f9fafb; border: 2px solid #f3f4f6; border-radius: 14px; margin: 12px 0; cursor: pointer; transition: 0.2s; }
        .option-label:hover { border-color: var(--primary); background: #f5f3ff; }
        .option-label input { width: 22px; height: 22px; margin-right: 15px; accent-color: var(--primary); flex-shrink: 0; }
        .option-text { font-size: 16px; color: #374151; width: 100%; }

        #timer { font-size: 36px; font-weight: 800; color: var(--secondary); text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #f1f5f9; text-align: left; }
        th { background: #f8fafc; font-weight: 800; color: #475569; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen" class="glass-card">
        <h1 style="text-align: center; color: var(--primary); font-size: 32px; margin-bottom: 10px;">Ustoz Pro</h1>
        <p style="text-align:center; color:#64748b; margin-bottom:30px;">Imtihon tizimiga xush kelibsiz</p>
        
        <div style="display: grid; gap: 15px;">
            <div><label>Sinfni tanlang</label>
                <select id="sClass" onchange="updateStudentsAndSubjects()">
                    <option value="">-- Tanlang --</option>
                    <option value="5-sinf">5-sinf</option>
                    <option value="6-sinf">6-sinf</option>
                    <option value="7-sinf">7-sinf</option>
                    <option value="8-sinf">8-sinf</option>
                </select>
            </div>
            <div><label>O'quvchi ismi</label><select id="sName"></select></div>
            <div><label>Fan yo'nalishi</label><select id="sSub"></select></div>
            <button class="btn" onclick="startTest()">Testni Boshlash</button>
        </div>
        <p onclick="goAdmin()" style="text-align:center; color:#cbd5e1; cursor:pointer; font-size:12px; margin-top:40px;">ADMIN PANEL</p>
    </div>

    <div id="test-screen" class="hidden">
        <div id="timer">20:00</div>
        <div id="questions-area"></div>
        <button class="btn btn-success" onclick="finishTest()">Testni Yakunlash</button>
    </div>

    <div id="result-screen" class="hidden glass-card" style="text-align:center">
        <h2 id="res-student-name"></h2>
        <div id="res-score" style="font-size: 80px; font-weight: 900; color: var(--success); margin: 20px 0;">0/0</div>
        <p style="color:#64748b;">Natijalaringiz muvaffaqiyatli saqlandi.</p>
        <button class="btn" onclick="location.reload()">Asosiy sahifa</button>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="admin-nav">
            <button class="tab-btn active" onclick="switchTab(event, 'tab-setup')">Yangilash</button>
            <button class="tab-btn" onclick="switchTab(event, 'tab-results')">Natijalar</button>
            <button class="btn" style="background:#64748b; width:auto; padding:10px 20px;" onclick="location.reload()">Chiqish</button>
        </div>
        <div id="tab-setup" class="tab-content glass-card">
            <h3>Bulutli tizim</h3>
            <button class="btn btn-sync" onclick="syncWithCloud()">Google Sheets'dan yuklash</button>
            <div id="sync-status" style="margin-top:10px; font-size:13px; color:#64748b;">Oxirgi yangilanish: ---</div>
        </div>
        <div id="tab-results" class="tab-content hidden glass-card">
            <div id="pdf-area">
                <h3>Imtihon Natijalari</h3>
                <table id="res-table">
                    <thead><tr><th>O'quvchi</th><th>Sinf</th><th>Fan</th><th>Ball</th><th>Sana</th></tr></thead>
                    <tbody id="res-body"></tbody>
                </table>
            </div>
            <button class="btn btn-success" onclick="downloadPDF()">PDF Yuklash</button>
        </div>
    </div>
</div>

<script>
    const TG_TOKEN = "7963878292:AAH0hUv_3F28mX7zK4jR7mX-T8i4Z8DYaK"; 
    const TG_CHAT_ID = "727716224";
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT80cxkCgcYdA0OqUOTkrLHeq-wp5MU29ullRUnuTX8L5IM3F3GIxdLtgbJxFrt18unljnQgdaoyarJ/pub?output=csv";

    // Ismlar ro'yxati (o'zgarishsiz qoldi)
    const STATIC_DATA = {
        students: {
            "5-sinf": ["Yo‘ldoshaliyev Abdulahad", "Nabijonova Sitora", "Abdumutaliyeva Asalxon", "Usmonxo‘jayeva Diyoraxon", "Bekmirzayev Otabek", "Hakimjonov Hamidullo", "Rustamova Malikaxon", "Usmonaliyev Alisher", "Musajonov Hojimurod", "Alijonov Islombek", "Imomova Xushnoza", "Nu‘monova Madina", "Sobirov Muhammadbobur", "Zuxriddinova Yasminaxon", "Inomjonov Ibrohim", "Bannonov Abdulloh", "Saidmo'minova Muhsinaxon", "Muhammadolimov Fahriddin", "Odiljonova Muslimaxon"],
            "6-sinf": ["Nosirjonova Layloxon", "Muhammadaliyeva Sevaraxon", "Mamasoliyeva Hadicha", "To‘lqinjonova Shahzoda", "Mamasoliyeva Mubina", "Qo‘shoqboyev Muhammadaziz", "Mansurjonov Hojakbar", "Soliyev Shamsiddin", "G‘ulomjonov Muhammaddiyor", "Soliyev Ziyovuddin", "Rustamjonova Rayxona", "Alijonov Anasxon", "Yusufjonova Fotimaxon", "Mamadnosirov G'olibjon", "Odiljonova Salomatxon", "Abdulazizova Nozimaxon"],
            "7-sinf": ["Yo'ldoshaliyeva Farzona", "Abdullayev Muslimbek", "Adhamov Jahongir", "Muxtorov Abdulloh", "Adhamjonov Muhammadyusuf", "Ergashboyev Abdulloh", "Abdumutalov Abdulbosit", "Akramjonov Murodillo", "Ashuraliyev Ilhomjon", "Omonaliyev Muhammad", "Bahodirov Saidabror", "Alijonov Mus'ab", "Kamoliddinov Shamshodbek", "Bahriddinov Muhammadjon", "Nuraliyev Muhammadyasin", "Xoshimjonov Dovudbek", "Ibrohimov Islomjon"],
            "8-sinf": ["Rustamova Mushtariy", "Usmonaliyev Sanjarbek", "Zokirjonova Zahroxon", "Nurmatova Mohinabonu", "Mamasoliyeva Arofatxon", "Mirzajonov Fayzulloh", "Zafarjonov Behruzbek", "Oʻlmasova Mohichehra", "Valijonova Zeboxon", "Lazizxonova Oyshabonu", "Tursunov Aliy", "Qodirov Bobomurod", "Inomjonova Umidaxon", "Ortiqboyeva Malikaxon", "Adhamjonov Muhammadsaid", "Qodirova Sarvinoz", "Abdulazizov Mashrabbek"]
        },
        subjects: {
            "5-sinf": ["Tarix", "Turk tili"],
            "6-sinf": ["Tarix", "Turk tili"],
            "7-sinf": ["Tarix", "Turk tili", "Geografiya"],
            "8-sinf": ["Tarix", "Turk tili", "Geografiya"]
        }
    };

    let db = JSON.parse(localStorage.getItem('ustoz_pro_v15')) || { classes: {}, results: [], lastSync: "---" };
    function save() { localStorage.setItem('ustoz_pro_v15', JSON.stringify(db)); }

    async function syncWithCloud() {
        try {
            const res = await fetch(SHEET_URL);
            const csv = await res.text();
            const lines = csv.split('\n').slice(1);
            db.classes = {};
            lines.forEach(line => {
                const parts = line.split(',');
                if(parts.length >= 8) {
                    const sinf = parts[0].trim(), fan = parts[1].trim(), q = parts[2].trim(), a = parts[3].trim(), b = parts[4].trim(), c = parts[5].trim(), d = parts[6].trim(), cr = parts[7].trim().toLowerCase(), v = parseInt(parts[8]) || 20, l = parseInt(parts[9]) || 15;
                    if(!db.classes[sinf]) db.classes[sinf] = {};
                    if(!db.classes[sinf][fan]) db.classes[sinf][fan] = { qs: [], time: v, limit: l };
                    db.classes[sinf][fan].qs.push({ q, a, b, c, d, cr });
                }
            });
            db.lastSync = new Date().toLocaleString('uz-UZ'); save();
            alert("Muvaffaqiyatli yangilandi!"); location.reload();
        } catch (e) { alert("Xatolik! Google Sheets havolasini tekshiring."); }
    }

    function updateStudentsAndSubjects() {
        const cls = document.getElementById('sClass').value;
        const sn = document.getElementById('sName'), ss = document.getElementById('sSub');
        sn.innerHTML = '<option value="">-- Ism --</option>';
        ss.innerHTML = '<option value="">-- Fan --</option>';
        if(cls) {
            STATIC_DATA.students[cls].forEach(s => sn.innerHTML += `<option value="${s}">${s}</option>`);
            STATIC_DATA.subjects[cls].forEach(sub => ss.innerHTML += `<option value="${sub}">${sub}</option>`);
        }
    }

    let currentQs = [], timer;
    function startTest() {
        const cls = document.getElementById('sClass').value, sub = document.getElementById('sSub').value, name = document.getElementById('sName').value;
        if(!cls || !sub || !name) return alert("Hamma joyni to'ldiring!");
        if(!db.classes[cls] || !db.classes[cls][sub]) return alert("Bu fan uchun testlar yuklanmagan!");

        const conf = db.classes[cls][sub];
        currentQs = [...conf.qs].sort(() => 0.5 - Math.random()).slice(0, conf.limit).map(q => {
            let opts = [{k:'a', v:q.a}, {k:'b', v:q.b}, {k:'c', v:q.c}, {k:'d', v:q.d}].sort(() => 0.5 - Math.random());
            return { ...q, mixed: opts };
        });

        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('test-screen').classList.remove('hidden');
        const area = document.getElementById('questions-area'); area.innerHTML = '';
        currentQs.forEach((q, i) => {
            let optsHtml = q.mixed.map(o => `
                <label class="option-label">
                    <input type="radio" name="q${i}" value="${o.k}"> 
                    <span class="option-text">${o.v}</span>
                </label>`).join('');
            area.innerHTML += `<div class="q-card"><div class="q-text">${i+1}. ${q.q}</div>${optsHtml}</div>`;
        });

        let t = conf.time * 60;
        timer = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0'+s:s}`;
            if(--t < 0) finishTest();
        }, 1000);
    }

    async function finishTest() {
        clearInterval(timer);
        let score = 0;
        currentQs.forEach((q, i) => {
            const ans = document.querySelector(`input[name="q${i}"]:checked`);
            if(ans && ans.value === q.cr) score++;
        });

        const res = { name: document.getElementById('sName').value, cls: document.getElementById('sClass').value, sub: document.getElementById('sSub').value, score, total: currentQs.length, date: new Date().toLocaleString('uz-UZ') };
        db.results.push(res); save();
        document.getElementById('test-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('res-score').innerText = `${score}/${res.total}`;
        document.getElementById('res-student-name').innerText = res.name;

        // Telegramga yuborish tizimi (Tuzatildi)
        const msg = `📊 *IMTIHON NATIJASI*\n\n👤 *O'quvchi:* ${res.name}\n🏫 *Sinf:* ${res.cls}\n📚 *Fan:* ${res.sub}\n✅ *Natija:* ${score} / ${res.total}\n📅 *Sana:* ${res.date}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: "Markdown" })
            });
        } catch (e) { console.log("Telegram error"); }
    }

    function switchTab(e, id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        e.target.classList.add('active');
        if(id === 'tab-results') {
            const body = document.getElementById('res-body'); body.innerHTML = '';
            db.results.slice().reverse().forEach(r => body.innerHTML += `<tr><td>${r.name}</td><td>${r.cls}</td><td>${r.sub}</td><td>${r.score}/${r.total}</td><td>${r.date}</td></tr>`);
        }
    }

    function downloadPDF() { html2pdf().from(document.getElementById('pdf-area')).save('Natijalar.pdf'); }
    function goAdmin() { if(prompt("Parol:") === "admin123") { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); switchTab({target: document.querySelector('.tab-btn')}, 'tab-setup'); } }
</script>
</body>
</html>
